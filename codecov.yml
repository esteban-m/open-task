# https://docs.codecov.com/docs/codecov-yaml
# Les chemins LCOV sont normalisés à la racine du dépôt dans CI
# (`scripts/ci/cli.mjs fix-lcov-paths`) avant upload — pas de fixes globaux ici
# (un préfixe `src/` partagé cassait la fusion backend vs scripts).

# Les branches partielles LCOV (Vitest/v8) ne doivent pas bloquer le 100 % lignes.
parsers:
  javascript:
    enable_partials: false
  lcov:
    partials_as_hits: true
  v1:
    include_full_missed_files: false

# Fichiers hors périmètre des tests unitaires (logique couverte via composables / e2e)
ignore:
  - "**/pages/**"
  - "**/histoire/**"
  - "**/*.story.vue"
  - "**/nuxt.config.ts"
  - "**/vitest.config.ts"
  - "**/vitest.config.mjs"
  - "**/histoire.config.ts"
  - "**/histoire-setup.ts"
  - "backend/scripts/**"
  - "backend/src/**/*.module.ts"
  - "backend/src/**/dto/**"
  - "backend/src/main.ts"
  - "backend/src/app.module.ts"

flag_management:
  default_rules:
    carryforward: false

coverage:
  status:
    project:
      backend:
        target: 100%
        threshold: 0%
        flags:
          - backend
      frontend:
        target: 100%
        threshold: 0%
        flags:
          - frontend
      scripts:
        target: 100%
        threshold: 0%
        flags:
          - scripts
    patch:
      default:
        target: auto
        threshold: 5%

comment:
  layout: reach,diff,flags,files
  behavior: default
  after_n_builds: 3
