# https://docs.codecov.com/docs/codecov-yaml
# Les chemins LCOV sont normalisés à la racine du dépôt dans CI
# (`scripts/ci/cli.mjs fix-lcov-paths`) avant upload — pas de fixes globaux ici
# (un préfixe `src/` partagé cassait la fusion backend vs scripts).

# Fichiers hors périmètre des tests unitaires (logique couverte via composables / e2e)
ignore:
  - "frontend/pages/**"
  - "backend/src/**/*.module.ts"
  - "backend/src/**/dto/**"
  - "backend/src/main.ts"
  - "backend/src/app.module.ts"

flag_management:
  default_rules:
    carryforward: false

coverage:
  status:
    project:
      backend:
        target: 75%
        threshold: 2%
        flags:
          - backend
      frontend:
        target: 75%
        threshold: 2%
        flags:
          - frontend
      scripts:
        target: 75%
        threshold: 2%
        flags:
          - scripts
    patch:
      default:
        target: auto

comment:
  layout: reach,diff,flags,files
  behavior: default
  after_n_builds: 3
