# https://docs.codecov.com/docs/codecov-yaml
# Monorepo : chemins LCOV relatifs → racine du dépôt
fixes:
  - "src/::backend/src/"
  - "composables/::frontend/composables/"
  - "config/::frontend/config/"
  - "stores/::frontend/stores/"
  - "utils/::frontend/utils/"
  - "components/::frontend/components/"
  - "middleware/::frontend/middleware/"
  - "plugins/::frontend/plugins/"
  - "pages/::frontend/pages/"
  - "scripts/docs/src/::scripts/docs/src/"
  - "cli.mjs::scripts/docs/cli.mjs"
  - "src/::scripts/ci/src/"
  - "ci/src/::scripts/ci/src/"
  - "cli.mjs::scripts/ci/cli.mjs"

flag_management:
  default_rules:
    carryforward: true

coverage:
  status:
    project:
      # Ne pas mélanger scripts (faible %) avec backend+frontend pour le gate principal
      default:
        target: 100%
        threshold: 0%
        flags:
          - backend
          - frontend
      scripts:
        target: 100%
        threshold: 0%
        flags:
          - scripts
    patch:
      default:
        target: auto

comment:
  layout: reach,diff,flags,files
  behavior: default
  after_n_builds: 3
