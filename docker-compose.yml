services:
  postgres:
    image: postgres:16-alpine
    container_name: open-task-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opentask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opentask_secret}
      POSTGRES_DB: ${POSTGRES_DB:-opentask}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-opentask}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: open-task-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-opentask}:${POSTGRES_PASSWORD:-opentask_secret}@postgres:5432/${POSTGRES_DB:-opentask}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # true = docker local ; false + secrets forts obligatoires en déploiement réel
      SKIP_PRODUCTION_SECRET_CHECK: ${SKIP_PRODUCTION_SECRET_CHECK:-true}
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: open-task-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
      NUXT_PUBLIC_WS_BASE_URL: ${WS_BASE_URL:-http://localhost:4000}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
