name: CodeQL

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - '.github/codeql/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - '.github/codeql/**'

jobs:
  analyze-typescript:
    name: CodeQL — Backend & Frontend (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      # NestJS + Nuxt : pas de build compilé requis (pas de binaire C/Java).
      # CodeQL analyse tout le JS/TS du repo, pas seulement les fichiers modifiés dans la PR.
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - uses: github/codeql-action/analyze@v4
        with:
          category: typescript
          wait-for-processing: true

  analyze-actions:
    name: CodeQL — Workflows GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - uses: github/codeql-action/analyze@v4
        with:
          category: actions
          wait-for-processing: true
