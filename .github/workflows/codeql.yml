name: CodeQL

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - '.github/codeql/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - '.github/codeql/**'

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      # Un seul job : TS (NestJS + Nuxt) + workflows Actions (évite 2 jobs parallèles redondants).
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript, actions
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - uses: github/codeql-action/analyze@v4
        with:
          category: open-task
          wait-for-processing: true
