# Publie la couverture des tests sur le wiki GitHub (pas GitHub Pages).
# https://github.com/marketplace/actions/coverage-summary-markdown
name: Wiki — couverture des tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wiki-coverage:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opentask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d opentask_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/opentask_test
      JWT_SECRET: ci_test_secret
      JWT_REFRESH_SECRET: ci_test_refresh_secret
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            scripts/docs/package-lock.json

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Prisma (backend)
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Préparer Nuxt (types)
        working-directory: frontend
        run: npx nuxt prepare

      - name: Install scripts/docs
        working-directory: scripts/docs
        run: npm ci

      - name: Backend unit coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Backend e2e coverage
        working-directory: backend
        run: npm run test:e2e:coverage

      - name: Frontend coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Scripts coverage
        working-directory: scripts/docs
        run: npm run test:coverage

      - name: Merge backend unit + e2e summaries
        run: |
          node scripts/ci/merge-coverage-summaries.mjs \
            -o backend/coverage/coverage-summary.json \
            backend/coverage/coverage-summary.json \
            backend/coverage-e2e/coverage-summary.json

      - name: Merge global coverage summary
        run: |
          node scripts/ci/merge-coverage-summaries.mjs \
            -o coverage-summary.wiki.json \
            backend/coverage/coverage-summary.json \
            frontend/coverage/coverage-summary.json \
            scripts/docs/coverage/coverage-summary.json

      # L’action ne produit qu’un tableau + badge à partir de jsonData.total.lines
      - name: Coverage markdown (global)
        id: cov_global
        uses: autoscatto/action-coverage-summary-markdown@2f2ac13e962a9e2b079a08dcafd9ff014263724f # v1.0.7
        with:
          summary_file: coverage-summary.wiki.json
          warning_threshold: 65
          good_threshold: 85

      - name: Coverage markdown (backend)
        id: cov_backend
        uses: autoscatto/action-coverage-summary-markdown@2f2ac13e962a9e2b079a08dcafd9ff014263724f # v1.0.7
        with:
          summary_file: backend/coverage/coverage-summary.json
          warning_threshold: 65
          good_threshold: 85

      - name: Coverage markdown (frontend)
        id: cov_frontend
        uses: autoscatto/action-coverage-summary-markdown@2f2ac13e962a9e2b079a08dcafd9ff014263724f # v1.0.7
        with:
          summary_file: frontend/coverage/coverage-summary.json
          warning_threshold: 65
          good_threshold: 85

      - name: Coverage markdown (scripts)
        id: cov_scripts
        uses: autoscatto/action-coverage-summary-markdown@2f2ac13e962a9e2b079a08dcafd9ff014263724f # v1.0.7
        with:
          summary_file: scripts/docs/coverage/coverage-summary.json
          warning_threshold: 40
          good_threshold: 55

      - name: Persist action markdown outputs
        env:
          GLOBAL_LINES: ${{ steps.cov_global.outputs.lines }}
          GLOBAL_BADGE: ${{ steps.cov_global.outputs.lines_badge }}
          BACKEND_LINES: ${{ steps.cov_backend.outputs.lines }}
          BACKEND_BADGE: ${{ steps.cov_backend.outputs.lines_badge }}
          FRONTEND_LINES: ${{ steps.cov_frontend.outputs.lines }}
          FRONTEND_BADGE: ${{ steps.cov_frontend.outputs.lines_badge }}
          SCRIPTS_LINES: ${{ steps.cov_scripts.outputs.lines }}
          SCRIPTS_BADGE: ${{ steps.cov_scripts.outputs.lines_badge }}
        run: |
          mkdir -p wiki-fragments
          printf '%s\n' "$GLOBAL_LINES" > wiki-fragments/global-lines.md
          printf '%s\n' "$GLOBAL_BADGE" > wiki-fragments/global-badge.md
          printf '%s\n' "$BACKEND_LINES" > wiki-fragments/backend-lines.md
          printf '%s\n' "$BACKEND_BADGE" > wiki-fragments/backend-badge.md
          printf '%s\n' "$FRONTEND_LINES" > wiki-fragments/frontend-lines.md
          printf '%s\n' "$FRONTEND_BADGE" > wiki-fragments/frontend-badge.md
          printf '%s\n' "$SCRIPTS_LINES" > wiki-fragments/scripts-lines.md
          printf '%s\n' "$SCRIPTS_BADGE" > wiki-fragments/scripts-badge.md

      - name: Build wiki markdown pages
        run: |
          node scripts/ci/build-wiki-coverage-pages.mjs \
            --out-dir wiki-out \
            --sha "${{ github.sha }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --repo-root "${{ github.workspace }}" \
            --package "Couverture-des-tests:Vue d'ensemble (monorepo):coverage-summary.wiki.json:wiki-fragments/global-lines.md:wiki-fragments/global-badge.md" \
            --package "Couverture-Backend:Backend (NestJS):backend/coverage/coverage-summary.json:wiki-fragments/backend-lines.md:wiki-fragments/backend-badge.md" \
            --package "Couverture-Frontend:Frontend (Nuxt / Vitest):frontend/coverage/coverage-summary.json:wiki-fragments/frontend-lines.md:wiki-fragments/frontend-badge.md" \
            --package "Couverture-Scripts:Scripts (pipeline docs):scripts/docs/coverage/coverage-summary.json:wiki-fragments/scripts-lines.md:wiki-fragments/scripts-badge.md"

      - name: Push to GitHub Wiki
        env:
          WIKI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          WIKI_URL="https://x-access-token:${WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone --depth 1 "$WIKI_URL" wiki-repo || {
            echo "::warning::Clone wiki échoué — crée une page initiale sur le wiki du dépôt puis relance."
            exit 1
          }
          cp wiki-out/*.md wiki-repo/
          cd wiki-repo
          if git status --porcelain | grep -q .; then
            git add Couverture-des-tests.md Couverture-Backend.md Couverture-Frontend.md Couverture-Scripts.md
            git commit -m "ci: mise à jour couverture (${GITHUB_SHA:0:7})"
            git push
          else
            echo "Wiki déjà à jour."
          fi
