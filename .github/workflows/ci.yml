# CI monorepo — une stack Playwright (smoke + démo) ; GIF et Pages uniquement sur main.
#
# Phase 1 (parallèle) : backend, frontend, scripts, e2e-playwright
# Phase 2 : report (Codecov + wiki) — needs backend, frontend, scripts
# Phase 3 (push main) : docs-build → docs-deploy — needs e2e-playwright (artefact demo-gifs)
#
# Workflows séparés : Docs (workflow_dispatch manuel), CodeQL (sécurité).

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend · lint & tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opentask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d opentask_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/opentask_test
      JWT_SECRET: ci_test_secret
      JWT_REFRESH_SECRET: ci_test_refresh_secret
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Dépendances
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Prisma (generate + migrate)
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Vérifier PostgreSQL (service CI)
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/5432) >/dev/null 2>&1; then
              echo "PostgreSQL prêt (port 5432)."
              echo "DATABASE_URL=$DATABASE_URL"
              exit 0
            fi
            sleep 1
          done
          echo "::error::PostgreSQL indisponible — les tests e2e ne peuvent pas tourner."
          exit 1

      - name: Tests unitaires (coverage)
        working-directory: backend
        run: npm run test:coverage -- --silent

      - name: Tests e2e (coverage, PostgreSQL requis)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/opentask_test
        run: |
          npm run test:e2e:coverage -- --silent
          node ../scripts/ci/cli.mjs assert-e2e coverage-e2e/coverage-summary.json

      - name: Fusionner résumés unit + e2e
        run: |
          node scripts/ci/cli.mjs merge-coverage \
            -o backend/coverage/coverage-summary.json \
            backend/coverage/coverage-summary.json \
            backend/coverage-e2e/coverage-summary.json

      - name: Artefacts coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-backend
          retention-days: 1
          if-no-files-found: error
          path: |
            backend/coverage/
            backend/coverage-e2e/

  frontend:
    name: Frontend · lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Dépendances
        working-directory: frontend
        run: npm ci

      - name: Préparer Nuxt (types)
        working-directory: frontend
        run: npx nuxt prepare

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Tests (coverage)
        working-directory: frontend
        run: npm run test:coverage -- --silent

      - name: Artefacts coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-frontend
          retention-days: 1
          if-no-files-found: error
          path: frontend/coverage/

  scripts:
    name: Scripts · docs & CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            scripts/docs/package-lock.json
            scripts/ci/package-lock.json

      - name: Dépendances docs
        working-directory: scripts/docs
        run: npm ci

      - name: Tests docs (coverage)
        working-directory: scripts/docs
        run: npm run test:coverage -- --silent

      - name: Dépendances CI
        working-directory: scripts/ci
        run: npm ci

      - name: Tests CI (coverage)
        working-directory: scripts/ci
        run: npm run test:coverage -- --silent

      - name: Fusionner coverage scripts (docs + ci)
        run: |
          node scripts/ci/cli.mjs merge-coverage \
            -o scripts/docs/coverage/coverage-summary.merged.json \
            scripts/docs/coverage/coverage-summary.json \
            scripts/ci/coverage/coverage-summary.json
          cp scripts/docs/coverage/coverage-summary.merged.json scripts/docs/coverage/coverage-summary.json

      - name: Artefacts coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-scripts
          retention-days: 1
          if-no-files-found: error
          path: |
            scripts/docs/coverage/
            scripts/ci/coverage/

  e2e-playwright:
    name: E2E · Playwright (smoke + démo)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opentask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d opentask_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/opentask_test
      JWT_SECRET: ci_playwright_jwt_secret_32chars_min_ok
      JWT_REFRESH_SECRET: ci_playwright_refresh_secret_32chars_ok
      FRONTEND_URL: http://127.0.0.1:3000
      NODE_ENV: development
      CI: true
      # Backend (auth throttle) + Playwright démo — doit être défini avant le démarrage de Nest
      PLAYWRIGHT_DEMO: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Dépendances e2e
        working-directory: e2e
        run: npm ci

      - name: Cache navigateur Playwright
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-chromium-${{ hashFiles('e2e/package-lock.json') }}

      - name: Navigateur Playwright (Chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        timeout-minutes: 15
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: ffmpeg (GIF, push main uniquement)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Stack + Playwright (une passe smoke + démo)
        run: |
          set -euo pipefail
          args=(--skip-docker --all-projects)
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            args+=(--gifs)
          fi
          bash scripts/ci/run-playwright-stack.sh "${args[@]}"

      - name: Artefact GIF (push main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: demo-gifs
          retention-days: 14
          path: docs/public/demo/

      - name: Artefacts Playwright (échec)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          retention-days: 7
          path: |
            e2e/playwright-report/
            e2e/test-results/

      - name: Vidéos démo brutes (échec, push main)
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-demo-videos
          retention-days: 7
          path: e2e/test-results/

  report:
    name: Rapports · Codecov & Wiki
    needs: [backend, frontend, scripts]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Télécharger coverage backend
        uses: actions/download-artifact@v8
        with:
          name: coverage-backend
          path: _cov/backend

      - name: Télécharger coverage frontend
        uses: actions/download-artifact@v8
        with:
          name: coverage-frontend
          path: _cov/frontend

      - name: Télécharger coverage scripts
        uses: actions/download-artifact@v8
        with:
          name: coverage-scripts
          path: _cov/scripts

      # Artefacts isolés dans _cov/* ; chemins exacts selon la version de upload-artifact.
      - name: Restaurer l’arborescence coverage
        run: |
          set -euo pipefail
          mkdir -p backend/coverage backend/coverage-e2e frontend/coverage scripts/docs/coverage scripts/ci/coverage

          pick() {
            local dir=$1 pattern=$2
            find "$dir" -path "$pattern" 2>/dev/null | head -1
          }

          b_sum=$(pick _cov/backend '*/backend/coverage/coverage-summary.json')
          b_sum=${b_sum:-$(find _cov/backend -name coverage-summary.json | head -1)}
          cp "$b_sum" backend/coverage/coverage-summary.json

          b_lcov=$(pick _cov/backend '*/backend/coverage/lcov.info')
          b_lcov=${b_lcov:-$(find _cov/backend -path '*/coverage/lcov.info' ! -path '*e2e*' | head -1)}
          cp "$b_lcov" backend/coverage/lcov.info

          b_e2e=$(pick _cov/backend '*/coverage-e2e/lcov.info')
          cp "$b_e2e" backend/coverage-e2e/lcov.info

          f_sum=$(pick _cov/frontend '*/frontend/coverage/coverage-summary.json')
          f_sum=${f_sum:-$(find _cov/frontend -name coverage-summary.json | head -1)}
          cp "$f_sum" frontend/coverage/coverage-summary.json
          f_lcov=$(pick _cov/frontend '*/frontend/coverage/lcov.info')
          f_lcov=${f_lcov:-$(find _cov/frontend -name lcov.info | head -1)}
          cp "$f_lcov" frontend/coverage/lcov.info

          s_sum=$(pick _cov/scripts '*/scripts/docs/coverage/coverage-summary.json')
          s_sum=${s_sum:-$(find _cov/scripts -name coverage-summary.json | head -1)}
          cp "$s_sum" scripts/docs/coverage/coverage-summary.json
          s_lcov=$(pick _cov/scripts '*/scripts/docs/coverage/lcov.info')
          s_lcov=${s_lcov:-$(find _cov/scripts -path '*/docs/coverage/lcov.info' | head -1)}
          cp "$s_lcov" scripts/docs/coverage/lcov.info

          s_ci_lcov=$(pick _cov/scripts '*/scripts/ci/coverage/lcov.info')
          s_ci_lcov=${s_ci_lcov:-$(find _cov/scripts -path '*/ci/coverage/lcov.info' ! -path '*docs*' | head -1)}
          cp "$s_ci_lcov" scripts/ci/coverage/lcov.info

          test -f backend/coverage/coverage-summary.json
          test -f frontend/coverage/coverage-summary.json
          test -f scripts/docs/coverage/coverage-summary.json
          test -f scripts/ci/coverage/lcov.info

      - name: Normaliser chemins LCOV (monorepo → racine dépôt)
        run: |
          set -euo pipefail
          node scripts/ci/cli.mjs fix-lcov-paths backend/coverage/lcov.info backend
          node scripts/ci/cli.mjs fix-lcov-paths backend/coverage-e2e/lcov.info backend
          node scripts/ci/cli.mjs fix-lcov-paths frontend/coverage/lcov.info frontend
          node scripts/ci/cli.mjs fix-lcov-paths scripts/docs/coverage/lcov.info scripts/docs
          node scripts/ci/cli.mjs fix-lcov-paths scripts/ci/coverage/lcov.info scripts/ci

      - name: Fusionner résumé monorepo
        run: |
          node scripts/ci/cli.mjs merge-coverage \
            -o coverage-summary.wiki.json \
            backend/coverage/coverage-summary.json \
            frontend/coverage/coverage-summary.json \
            scripts/docs/coverage/coverage-summary.json

      - name: Markdown synthèse (badges + tableaux)
        run: |
          node scripts/ci/cli.mjs coverage-markdown \
            --summary coverage-summary.wiki.json --prefix global --warning 65 --good 85
          node scripts/ci/cli.mjs coverage-markdown \
            --summary backend/coverage/coverage-summary.json --prefix backend --warning 65 --good 85
          node scripts/ci/cli.mjs coverage-markdown \
            --summary frontend/coverage/coverage-summary.json --prefix frontend --warning 65 --good 85
          node scripts/ci/cli.mjs coverage-markdown \
            --summary scripts/docs/coverage/coverage-summary.json --prefix scripts --warning 40 --good 55

      - name: Pages wiki (markdown)
        run: |
          node scripts/ci/cli.mjs wiki-pages \
            --out-dir wiki-out \
            --sha "${{ github.sha }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --repo-root "${{ github.workspace }}" \
            --package "Couverture-des-tests:Vue d'ensemble (monorepo):coverage-summary.wiki.json:wiki-fragments/global-lines.md:wiki-fragments/global-badge.md" \
            --package "Couverture-Backend:Backend (NestJS):backend/coverage/coverage-summary.json:wiki-fragments/backend-lines.md:wiki-fragments/backend-badge.md" \
            --package "Couverture-Frontend:Frontend (Nuxt / Vitest):frontend/coverage/coverage-summary.json:wiki-fragments/frontend-lines.md:wiki-fragments/frontend-badge.md" \
            --package "Couverture-Scripts:Scripts (docs + CI):scripts/docs/coverage/coverage-summary.json:wiki-fragments/scripts-lines.md:wiki-fragments/scripts-badge.md"

      - name: Codecov · backend
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/lcov.info
          flags: backend
          name: backend
          disable_search: true
          verbose: false
          fail_ci_if_error: true

      - name: Codecov · frontend
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend
          disable_search: true
          verbose: false
          fail_ci_if_error: true

      - name: Codecov · scripts
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: scripts/docs/coverage/lcov.info,scripts/ci/coverage/lcov.info
          flags: scripts
          name: scripts
          directory: .
          disable_search: true
          verbose: false
          fail_ci_if_error: true

      - name: Publier le wiki (main uniquement)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          WIKI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          WIKI_URL="https://x-access-token:${WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          if git clone --depth 1 "$WIKI_URL" wiki-repo 2>/dev/null; then
            echo "Wiki cloné."
          else
            echo "::notice::Wiki absent — initialisation."
            mkdir -p wiki-repo
            cd wiki-repo
            git init -b master
            git remote add origin "$WIKI_URL"
            printf '%s\n' '# Open Task' '' "Wiki du dépôt [${{ github.event.repository.name }}](https://github.com/${{ github.repository }})." > Home.md
            git add Home.md
            git commit -m "ci: initialiser le wiki"
            git push -u origin master
            cd ..
          fi

          cp wiki-out/*.md wiki-repo/
          cd wiki-repo
          git add Couverture-des-tests.md Couverture-Backend.md Couverture-Frontend.md Couverture-Scripts.md
          if git diff --staged --quiet; then
            echo "Wiki déjà à jour."
            exit 0
          fi
          git commit -m "ci: couverture (${GITHUB_SHA:0:7})"
          git push origin HEAD || {
            echo "::error::Push wiki impossible — activer Wikis (Settings → General → Features)."
            exit 1
          }

  docs-build:
    name: Docs · build (Pages)
    needs: [e2e-playwright]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      has_site: ${{ steps.check-site.outputs.has_site }}
    steps:
      - uses: actions/checkout@v6

      - name: GIF démo (artefact e2e-playwright)
        uses: actions/download-artifact@v8
        with:
          name: demo-gifs
          path: docs/public/demo

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: scripts/docs/package-lock.json

      - name: Dépendances scripts docs
        working-directory: scripts/docs
        run: npm ci

      - name: Vérifier secret Mistral
        run: |
          if [ -z "${{ secrets.MISTRAL_API_KEY }}" ]; then
            echo "::error::Ajoutez le secret MISTRAL_API_KEY dans Settings → Secrets → Actions."
            exit 1
          fi

      - name: Valider clé Mistral
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL || 'mistral-small-latest' }}
          MISTRAL_REQUEST_DELAY_MS: ${{ vars.MISTRAL_REQUEST_DELAY_MS || '3000' }}
          MISTRAL_RETRY_MAX: ${{ vars.MISTRAL_RETRY_MAX || '10' }}
        working-directory: scripts/docs
        run: npm run validate-mistral

      - name: Générer contenu (BDD, API, IA)
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL || 'mistral-small-latest' }}
          MISTRAL_REQUEST_DELAY_MS: ${{ vars.MISTRAL_REQUEST_DELAY_MS || '2000' }}
          MISTRAL_RETRY_MAX: ${{ vars.MISTRAL_RETRY_MAX || '8' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTIONS: 'true'
          DOCUDOODLE_MAX_FILES: ${{ vars.DOCUDOODLE_MAX_FILES || '12' }}
        working-directory: scripts/docs
        run: npm run generate

      - name: Build site VitePress
        working-directory: docs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          DOCS_BASE: /${{ github.event.repository.name }}/docs/
        run: |
          npm ci
          npm run build

      - name: OpenAPI (export statique)
        working-directory: backend
        env:
          JWT_SECRET: ci_docs_openapi_jwt_secret_32chars_minimum
          JWT_REFRESH_SECRET: ci_docs_openapi_refresh_secret_32chars
        run: |
          npm ci
          npx prisma generate
          npm run export:openapi

      - name: Histoire (build statique)
        working-directory: frontend
        env:
          HISTOIRE_BASE: /${{ github.event.repository.name }}/histoire/
        run: |
          npm ci
          npx nuxt prepare
          npm run build-histoire

      - name: Assembler portail GitHub Pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/docs/cli.mjs build-pages

      - name: Vérifier artefact site
        id: check-site
        run: |
          if [ -d docs-site ]; then
            echo "has_site=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_site=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  docs-deploy:
    name: Docs · deploy Pages
    needs: [docs-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.docs-build.outputs.has_site == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
