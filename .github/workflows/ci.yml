name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint, tests & e2e
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opentask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d opentask_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/opentask_test
      JWT_SECRET: ci_test_secret
      JWT_REFRESH_SECRET: ci_test_refresh_secret
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Générer le client Prisma
        working-directory: backend
        run: npx prisma generate

      - name: Migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Tests unitaires
        working-directory: backend
        run: npm test -- --passWithNoTests

      - name: Tests e2e
        working-directory: backend
        run: npm run test:e2e

  frontend:
    name: Frontend — Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: frontend
        run: npm ci

      - name: Préparer Nuxt (types)
        working-directory: frontend
        run: npx nuxt prepare

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present
