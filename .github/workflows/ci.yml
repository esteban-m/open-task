name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opentask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d opentask_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/opentask_test
      JWT_SECRET: ci_test_secret
      JWT_REFRESH_SECRET: ci_test_refresh_secret
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Générer le client Prisma
        working-directory: backend
        run: npx prisma generate

      - name: Migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Tests (unit + e2e) avec coverage
        working-directory: backend
        run: npm run test:coverage:ci

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/lcov.info,backend/coverage-e2e/lcov.info
          flags: backend
          name: backend
          disable_search: true
          fail_ci_if_error: true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: frontend
        run: npm ci

      - name: Préparer Nuxt (types)
        working-directory: frontend
        run: npx nuxt prepare

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Tests unitaires (coverage)
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend
          directory: frontend
          disable_search: true
          fail_ci_if_error: true

  scripts:
    name: Scripts (docs pipeline)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/docs/package-lock.json

      - name: Installer les dépendances
        working-directory: scripts/docs
        run: npm ci

      - name: Tests unitaires (coverage)
        working-directory: scripts/docs
        run: npm run test:coverage

      - name: Upload scripts coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: scripts/docs/coverage/lcov.info
          flags: scripts
          name: scripts
          directory: scripts/docs
          disable_search: true
          fail_ci_if_error: true
