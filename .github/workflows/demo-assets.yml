# Valide les parcours Playwright (desktop + mobile) sur les PR.
# Les GIF sont publiés sur GitHub Pages via le workflow Docs (push main) — pas de commit sur main.
name: Demo assets (GIF)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demo-assets-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-demos:
    name: Playwright → GIF (validation PR)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opentask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d opentask_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/opentask_test
      JWT_SECRET: ci_demo_assets_jwt_secret_32chars_minimum
      JWT_REFRESH_SECRET: ci_demo_assets_refresh_secret_32chars
      FRONTEND_URL: http://127.0.0.1:3000
      NODE_ENV: development
      PLAYWRIGHT_DEMO: '1'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: ffmpeg (WebM → GIF)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Playwright + conversion GIF
        run: bash scripts/ci/run-playwright-stack.sh --skip-docker

      - name: Artefact GIF (revue PR)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: demo-gifs
          retention-days: 14
          path: docs/public/demo/

      - name: Artefacts bruts (vidéos)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-demo-videos
          retention-days: 7
          path: e2e/test-results/
