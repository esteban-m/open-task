# Enregistre les parcours Playwright (desktop + mobile), produit des GIF dans assets/demo/.
# - PR : tests + artefact demo-gifs (pas de commit → merge possible)
# - push main : PR bot → merge (pas de git push direct : ruleset CodeQL sur main)
# Pages / Wiki ne poussent pas sur main → pas soumis à cette ruleset.
name: Demo assets (GIF)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/demo/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'assets/demo/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: demo-assets-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-gifs:
    name: Playwright → GIF → assets/demo
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opentask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d opentask_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/opentask_test
      JWT_SECRET: ci_demo_assets_jwt_secret_32chars_minimum
      JWT_REFRESH_SECRET: ci_demo_assets_refresh_secret_32chars
      FRONTEND_URL: http://127.0.0.1:3000
      NODE_ENV: development
      PLAYWRIGHT_DEMO: '1'

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'main' }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: ffmpeg (WebM → GIF)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Playwright + conversion GIF
        run: bash scripts/ci/run-playwright-stack.sh --skip-docker

      - name: Ouvrir PR pour publier les GIF sur main
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: publish-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'assets: démos Playwright (desktop + mobile GIF)'
          title: 'assets: démos Playwright (GIF)'
          body: |
            GIF générés par le workflow [Demo assets](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            **Pourquoi une PR ?** La ruleset *Protect main — CodeQL* refuse un `git push` direct du bot tant que CodeQL n’a pas tourné sur ce commit (Pages et le wiki ne poussent pas sur `main`, donc pas ce blocage).

            Auto-merge activé ci-dessous après les checks (CodeQL inclus).
          branch: bot/demo-gifs
          delete-branch: true
          add-paths: |
            assets/demo/desktop/
            assets/demo/mobile/
            assets/demo/INDEX.md

      - name: Auto-merge de la PR GIF
        if: steps.publish-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.publish-pr.outputs.pull-request-number }}"
          if gh pr merge "$PR" --squash --auto 2>/dev/null; then
            echo "PR #$PR : auto-merge activé (après CodeQL)."
          else
            echo "::notice::Activer l'auto-merge du dépôt ou merger manuellement la PR #$PR (CodeQL doit passer)."
          fi

      - name: Artefact GIF (téléchargement)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: demo-gifs
          retention-days: 30
          path: |
            assets/demo/desktop/
            assets/demo/mobile/
            assets/demo/INDEX.md

      - name: Artefacts bruts (vidéos)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-demo-videos
          retention-days: 14
          path: e2e/test-results/
