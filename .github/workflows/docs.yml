# Regénération manuelle du site (Pages) — push main passe par CI (docs-build / docs-deploy).
#
# Secret requis : MISTRAL_API_KEY
# Option workflow_dispatch : skip_ai pour ignorer Mistral (diagramme + modules)

name: Docs

on:
  workflow_dispatch:
    inputs:
      skip_ai:
        description: 'Ignorer la génération IA (diagramme + modules)'
        required: false
        default: false
        type: boolean
      skip_playwright:
        description: 'Réutiliser les GIF déjà présents dans docs/public/demo (pas de stack Playwright)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-manual-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  e2e-gifs:
    name: Playwright → GIF (manuel)
    if: ${{ github.event.inputs.skip_playwright != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: opentask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d opentask_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/opentask_test
      JWT_SECRET: ci_docs_demo_jwt_secret_32chars_minimum
      JWT_REFRESH_SECRET: ci_docs_demo_refresh_secret_32chars
      FRONTEND_URL: http://127.0.0.1:3000
      NODE_ENV: development
      PLAYWRIGHT_DEMO: '1'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: ffmpeg (WebM → GIF)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Stack + Playwright + GIF
        run: bash scripts/ci/run-playwright-stack.sh --skip-docker --all-projects --gifs

      - name: Artefact GIF
        uses: actions/upload-artifact@v6
        with:
          name: demo-gifs
          retention-days: 14
          path: docs/public/demo/

  generate-docs:
    name: Build
    needs: [e2e-gifs]
    if: always() && (needs.e2e-gifs.result == 'success' || needs.e2e-gifs.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      has_site: ${{ steps.check-site.outputs.has_site }}
    steps:
      - uses: actions/checkout@v6

      - name: GIF démo (artefact Playwright)
        if: ${{ github.event.inputs.skip_playwright != true }}
        uses: actions/download-artifact@v6
        with:
          name: demo-gifs
          path: docs/public/demo

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: scripts/docs/package-lock.json

      - name: Dépendances scripts docs
        working-directory: scripts/docs
        run: npm ci

      - name: Vérifier secret Mistral
        if: ${{ github.event.inputs.skip_ai != true }}
        run: |
          if [ -z "${{ secrets.MISTRAL_API_KEY }}" ]; then
            echo "::error::Ajoutez le secret MISTRAL_API_KEY dans Settings → Secrets → Actions."
            exit 1
          fi

      - name: Valider clé Mistral
        if: ${{ github.event.inputs.skip_ai != true }}
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL || 'mistral-small-latest' }}
          MISTRAL_REQUEST_DELAY_MS: ${{ vars.MISTRAL_REQUEST_DELAY_MS || '3000' }}
          MISTRAL_RETRY_MAX: ${{ vars.MISTRAL_RETRY_MAX || '10' }}
        working-directory: scripts/docs
        run: npm run validate-mistral

      - name: Générer contenu (BDD, API, IA)
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL || 'mistral-small-latest' }}
          MISTRAL_REQUEST_DELAY_MS: ${{ vars.MISTRAL_REQUEST_DELAY_MS || '2000' }}
          MISTRAL_RETRY_MAX: ${{ vars.MISTRAL_RETRY_MAX || '8' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTIONS: 'true'
          SKIP_AI: ${{ github.event.inputs.skip_ai == true && 'true' || '' }}
          DOCUDOODLE_MAX_FILES: ${{ vars.DOCUDOODLE_MAX_FILES || '12' }}
        working-directory: scripts/docs
        run: npm run generate

      - name: Build site VitePress
        working-directory: docs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          DOCS_BASE: /${{ github.event.repository.name }}/docs/
        run: |
          npm ci
          npm run build

      - name: OpenAPI (export statique)
        working-directory: backend
        env:
          JWT_SECRET: ci_docs_openapi_jwt_secret_32chars_minimum
          JWT_REFRESH_SECRET: ci_docs_openapi_refresh_secret_32chars
        run: |
          npm ci
          npx prisma generate
          npm run export:openapi

      - name: Histoire (build statique)
        working-directory: frontend
        env:
          HISTOIRE_BASE: /${{ github.event.repository.name }}/histoire/
        run: |
          npm ci
          npx nuxt prepare
          npm run build-histoire

      - name: Assembler portail GitHub Pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/docs/cli.mjs build-pages

      - name: Vérifier artefact site
        id: check-site
        run: |
          if [ -d docs-site ]; then
            echo "has_site=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_site=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy-pages:
    name: Deploy
    needs: generate-docs
    if: needs.generate-docs.outputs.has_site == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
