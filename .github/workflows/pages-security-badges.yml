# Badges sécurité dynamiques → GitHub Pages (pas de JSON commité sur main).
# https://esteban-m.github.io/open-task/badges/

name: Security badges (Pages)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
  # Toute branche (push = PR, feature, main, develop…)
  push:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: read

concurrency:
  group: pages-security-badges
  cancel-in-progress: false

jobs:
  deploy:
    name: Générer et publier les badges
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Générer les JSON depuis l’API GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/generate-security-badges.sh
          ./scripts/generate-security-badges.sh site/badges

          # Copie par branche (slug) pour usage optionnel ; défaut = site/badges/
          slug="${GITHUB_REF_NAME//\//-}"
          mkdir -p "site/badges/branches/${slug}"
          cp site/badges/*.json "site/badges/branches/${slug}/"

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Déployer GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
