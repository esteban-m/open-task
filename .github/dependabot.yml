version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: deps
    groups:
      backend:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: deps
    groups:
      frontend:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
    groups:
      ci:
        patterns: ['*']
